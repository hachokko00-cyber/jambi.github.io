  <title>잼비의 매매일지</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --jam-primary: #F07B39;
      --jam-light: #FEF3EC;
      --jam-mid: #FDDCC8;
      --jam-dark: #C25A1A;
      --bg: #FFFAF7;
      --bg2: #FEF3EC;
      --bg3: #FDE8D5;
      --text: #2C1A0E;
      --text2: #7A5A45;
      --text3: #B89080;
      --border: rgba(240,123,57,0.18);
      --border2: rgba(240,123,57,0.35);
      --pos: #D04010;
      --neg: #2F6FBB;
      --radius-md: 10px;
      --radius-lg: 16px;
      --shadow: 0 2px 12px rgba(240,123,57,0.10);
    }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Pretendard', 'Noto Sans KR', sans-serif; background: var(--bg3); color: var(--text); min-height: 100vh; padding: 2rem 1rem; }

    .container { max-width: 720px; margin: 0 auto; background: var(--bg); border-radius: 20px; border: 1px solid var(--border2); padding: 1.75rem; box-shadow: var(--shadow); }

    .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; }
    .logo { display: flex; align-items: center; gap: 10px; }
    .logo-icon { width: 36px; height: 36px; background: var(--jam-primary); border-radius: 10px; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 18px; }
    .logo-text { font-size: 17px; font-weight: 600; color: var(--text); cursor: pointer; border-bottom: 1px dashed transparent; transition: border-color 0.15s; }
    .logo-text:hover { border-bottom-color: var(--jam-primary); }
    .logo-sub { font-size: 12px; color: var(--text3); cursor: pointer; border-bottom: 1px dashed transparent; transition: border-color 0.15s; }
    .logo-sub:hover { border-bottom-color: var(--text3); }
    .logo-input { font-family: inherit; background: none; border: none; border-bottom: 1.5px solid var(--jam-primary); outline: none; color: var(--text); padding: 0; }
    .logo-input.main { font-size: 17px; font-weight: 600; width: 160px; }
    .logo-input.sub { font-size: 12px; color: var(--text3); width: 140px; }
    .header-actions { display: flex; gap: 8px; }
    .btn-icon { padding: 7px 12px; font-size: 12px; font-weight: 500; border-radius: var(--radius-md); cursor: pointer; border: 1px solid var(--border2); background: var(--bg2); color: var(--text2); display: flex; align-items: center; gap: 5px; }
    .btn-icon:hover { background: var(--jam-mid); }

    /* Goal bar */
    .goal-bar { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 14px 18px; margin-bottom: 1.25rem; }
    .goal-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .goal-label { font-size: 13px; font-weight: 500; color: var(--text2); }
    .goal-edit { font-size: 12px; color: var(--jam-primary); cursor: pointer; border: none; background: none; font-family: inherit; }
    .goal-progress-wrap { height: 8px; background: var(--jam-mid); border-radius: 4px; overflow: hidden; }
    .goal-progress { height: 100%; border-radius: 4px; background: linear-gradient(90deg, var(--jam-primary), var(--jam-dark)); transition: width 0.5s; }
    .goal-numbers { display: flex; justify-content: space-between; margin-top: 6px; font-size: 12px; color: var(--text3); }
    .goal-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.35); z-index: 100; align-items: center; justify-content: center; }
    .goal-modal.open { display: flex; }
    .goal-modal-box { background: var(--bg); border-radius: var(--radius-lg); padding: 24px; width: 320px; box-shadow: 0 8px 32px rgba(0,0,0,0.15); }
    .goal-modal-title { font-size: 15px; font-weight: 600; margin-bottom: 16px; }
    .goal-modal-box input { width: 100%; padding: 9px 12px; border: 1px solid var(--border2); border-radius: var(--radius-md); font-size: 14px; font-family: inherit; background: var(--bg); color: var(--text); outline: none; margin-bottom: 12px; }
    .goal-modal-btns { display: flex; gap: 8px; }
    .btn-primary { flex: 1; padding: 9px; font-size: 13px; font-weight: 500; background: var(--jam-primary); color: #fff; border: none; border-radius: var(--radius-md); cursor: pointer; }
    .btn-cancel { flex: 1; padding: 9px; font-size: 13px; background: var(--bg2); color: var(--text2); border: 1px solid var(--border2); border-radius: var(--radius-md); cursor: pointer; }

    /* Tabs */
    .tabs { display: flex; gap: 4px; background: var(--bg2); border-radius: var(--radius-lg); padding: 4px; margin-bottom: 1.5rem; }
    .tab { flex: 1; padding: 8px 4px; font-size: 13px; font-weight: 400; color: var(--text2); background: none; border: none; border-radius: 10px; cursor: pointer; transition: all 0.15s; display: flex; align-items: center; justify-content: center; gap: 5px; }
    .tab.active { background: #fff; color: var(--jam-primary); font-weight: 600; box-shadow: 0 1px 4px rgba(240,123,57,0.15); }

    .section { display: none; }
    .section.active { display: block; }

    /* Form */
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .form-group { display: flex; flex-direction: column; gap: 5px; }
    .form-group.full { grid-column: 1 / -1; }
    label { font-size: 12px; color: var(--text2); font-weight: 500; }
    input, select, textarea { width: 100%; padding: 9px 11px; font-size: 14px; font-family: inherit; background: var(--bg); border: 1px solid var(--border2); border-radius: var(--radius-md); color: var(--text); outline: none; transition: border-color 0.15s; }
    input:focus, select:focus, textarea:focus { border-color: var(--jam-primary); }
    textarea { resize: vertical; min-height: 72px; line-height: 1.6; }

    .calc-box { background: var(--jam-light); border: 1px solid var(--jam-mid); border-radius: var(--radius-md); padding: 13px 16px; margin-top: 4px; display: none; gap: 24px; align-items: center; flex-wrap: wrap; }
    .calc-item { display: flex; flex-direction: column; gap: 3px; }
    .calc-label { font-size: 11px; color: var(--text3); }
    .calc-value { font-size: 17px; font-weight: 600; }
    .pos { color: var(--pos); }
    .neg { color: var(--neg); }

    .btn-save { margin-top: 16px; width: 100%; padding: 11px; font-size: 14px; font-weight: 600; background: linear-gradient(135deg, var(--jam-primary), var(--jam-dark)); color: #fff; border: none; border-radius: var(--radius-md); cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 7px; transition: opacity 0.15s; }
    .btn-save:hover { opacity: 0.9; }

    /* Stats */
    .summary-cards { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 1.25rem; }
    .scard { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius-md); padding: 13px 14px; }
    .scard-label { font-size: 11px; color: var(--text3); margin-bottom: 5px; }
    .scard-value { font-size: 19px; font-weight: 600; }

    .chart-wrap { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 16px; margin-bottom: 1rem; }
    .chart-title { font-size: 13px; font-weight: 500; color: var(--text2); margin-bottom: 12px; }
    .chart-inner { position: relative; height: 200px; }

    .win-rate-bar { height: 8px; background: var(--jam-mid); border-radius: 4px; overflow: hidden; margin: 6px 0; }
    .win-rate-fill { height: 100%; border-radius: 4px; background: linear-gradient(90deg, var(--jam-primary), var(--jam-dark)); transition: width 0.5s; }

    /* Stock analysis */
    .stock-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .stock-table th { text-align: left; padding: 8px 10px; font-size: 11px; font-weight: 500; color: var(--text3); border-bottom: 1px solid var(--border); }
    .stock-table td { padding: 10px 10px; border-bottom: 1px solid var(--border); }
    .stock-table tr:last-child td { border-bottom: none; }
    .stock-bar-wrap { background: var(--jam-mid); border-radius: 3px; height: 5px; overflow: hidden; width: 80px; }
    .stock-bar { height: 100%; border-radius: 3px; background: var(--jam-primary); }

    /* Calendar */
    .cal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
    .cal-nav { background: none; border: 1px solid var(--border2); border-radius: 8px; padding: 5px 10px; cursor: pointer; font-size: 14px; color: var(--text2); }
    .cal-title { font-size: 15px; font-weight: 600; }
    .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; }
    .cal-day-label { text-align: center; font-size: 11px; color: var(--text3); padding: 4px 0; font-weight: 500; }
    .cal-cell { min-height: 62px; border-radius: 8px; padding: 5px 6px; background: var(--bg2); font-size: 11px; cursor: pointer; position: relative; border: 1px solid transparent; }
    .cal-cell:hover { border-color: var(--border2); }
    .cal-cell.has-trade { background: var(--jam-light); border-color: var(--jam-mid); }
    .cal-cell.today { border-color: var(--jam-primary); }
    .cal-cell.other-month { opacity: 0.35; }
    .cal-date { font-size: 12px; font-weight: 500; margin-bottom: 3px; }
    .cal-dot { font-size: 10px; color: var(--jam-primary); font-weight: 600; }
    .cal-pnl { font-size: 10px; font-weight: 500; }

    /* List */
    .filter-bar { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
    .filter-bar input { flex: 1; min-width: 120px; }

    .trade-list { display: flex; flex-direction: column; gap: 8px; }
    .trade-card { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 13px 16px; cursor: pointer; transition: border-color 0.15s, box-shadow 0.15s; }
    .trade-card:hover { border-color: var(--border2); box-shadow: var(--shadow); }
    .trade-card.expanded { border-color: var(--jam-primary); }
    .tc-header { display: flex; justify-content: space-between; align-items: center; }
    .tc-left { display: flex; align-items: center; gap: 10px; }
    .tc-ticker { font-size: 15px; font-weight: 600; }
    .tc-name { font-size: 12px; color: var(--text3); }
    .tc-right { display: flex; align-items: center; gap: 12px; }
    .tc-pnl { font-size: 15px; font-weight: 600; }
    .tc-date { font-size: 12px; color: var(--text3); }
    .badge { font-size: 11px; padding: 3px 9px; border-radius: 100px; font-weight: 600; }
    .badge-buy { background: #FAECE7; color: #B03510; }
    .badge-sell { background: #E6F1FB; color: #185FA5; }
    .tc-detail { margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); display: none; }
    .tc-detail.open { display: block; }
    .detail-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 10px; }
    .detail-item { display: flex; flex-direction: column; gap: 3px; }
    .detail-label { font-size: 11px; color: var(--text3); }
    .detail-value { font-size: 13px; font-weight: 500; }
    .memo-box { font-size: 13px; color: var(--text2); line-height: 1.6; background: var(--jam-light); border-radius: var(--radius-md); padding: 9px 13px; }
    .tc-actions { display: flex; gap: 6px; margin-top: 10px; justify-content: flex-end; }
    .btn-sm { padding: 5px 13px; font-size: 12px; border-radius: var(--radius-md); cursor: pointer; border: 1px solid var(--border2); background: none; color: var(--text2); }
    .btn-del { color: #A32D2D; border-color: #F7C1C1; }

    .empty { text-align: center; padding: 3rem 0; color: var(--text3); font-size: 14px; }

    .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: var(--jam-dark); color: #fff; padding: 10px 22px; border-radius: 100px; font-size: 13px; opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 999; }
    .toast.show { opacity: 1; }

    @media (max-width: 520px) {
      .form-grid { grid-template-columns: 1fr; }
      .form-group.full { grid-column: 1; }
      .summary-cards { grid-template-columns: repeat(2, 1fr); }
      .detail-grid { grid-template-columns: repeat(2, 1fr); }
      .tabs { gap: 2px; }
      .tab { font-size: 11px; padding: 7px 2px; }
    }
  </style>
</head>

          <option>후회</option>
        </select>
      </div>
      <div class="form-group full">
        <label>메모 · 반성</label>
        <textarea id="f-memo" placeholder="매매 이유, 시장 상황, 반성할 점을 적어보세요"></textarea>
      </div>
    </div>
    <div class="calc-box" id="calc-box">
      <div class="calc-item"><span class="calc-label">평가 손익</span><span class="calc-value" id="calc-pnl">-</span></div>
      <div class="calc-item"><span class="calc-label">수익률</span><span class="calc-value" id="calc-rate">-</span></div>
      <div class="calc-item"><span class="calc-label">총 투자금</span><span class="calc-value" id="calc-total">-</span></div>
    </div>
    <button class="btn-save" onclick="saveTrade()"><i class="ti ti-device-floppy" aria-hidden="true"></i> 저장하기</button>
  </div>

  <!-- 통계 -->
  <div id="stats" class="section">
    <div class="summary-cards">
      <div class="scard"><div class="scard-label">총 매매 횟수</div><div class="scard-value" id="stat-count">0</div></div>
      <div class="scard"><div class="scard-label">승률</div><div class="scard-value" id="stat-wr">0%</div></div>
      <div class="scard"><div class="scard-label">누적 손익</div><div class="scard-value" id="stat-total-pnl">0원</div></div>
      <div class="scard"><div class="scard-label">평균 수익률</div><div class="scard-value" id="stat-avg-rate">0%</div></div>
    </div>
    <div class="chart-wrap">
      <div class="chart-title">승률 현황</div>
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:4px;">
        <span style="font-size:12px;color:var(--text3);">승</span>
        <div class="win-rate-bar" style="flex:1;"><div class="win-rate-fill" id="wr-fill" style="width:0%;"></div></div>
        <span style="font-size:12px;color:var(--text3);" id="wr-text">0승 0패</span>
      </div>
    </div>
    <div class="chart-wrap">
      <div class="chart-title">누적 손익 추이</div>
      <div class="chart-inner"><canvas id="pnlChart" role="img" aria-label="누적 손익 추이 차트"></canvas></div>
    </div>
    <div class="chart-wrap">
      <div class="chart-title">전략별 매매 분포</div>
      <div class="chart-inner" style="height:160px;"><canvas id="stratChart" role="img" aria-label="전략별 매매 분포 차트"></canvas></div>
    </div>
  </div>

  <!-- 종목별 성과 -->
  <div id="stocks" class="section">
    <div class="chart-wrap" style="margin-bottom:0;">
      <div class="chart-title">종목별 성과 분석</div>
      <table class="stock-table">
        <thead>
          <tr>
            <th>종목</th>
            <th>매매 횟수</th>
            <th>누적 손익</th>
            <th>평균 수익률</th>
            <th>승률</th>
            <th>비중</th>
          </tr>
        </thead>
        <tbody id="stock-tbody"></tbody>
      </table>
      <div class="empty" id="stock-empty" style="display:none;padding:2rem 0;"><i class="ti ti-inbox" style="font-size:28px;display:block;margin-bottom:8px;" aria-hidden="true"></i>매매 기록을 입력하면 분석이 나타나요</div>
    </div>
  </div>

  <!-- 캘린더 -->
  <div id="calendar" class="section">
    <div class="chart-wrap" style="margin-bottom:0;">
      <div class="cal-header">
        <button class="cal-nav" onclick="changeMonth(-1)">&#8249;</button>
        <span class="cal-title" id="cal-title"></span>
        <button class="cal-nav" onclick="changeMonth(1)">&#8250;</button>
      </div>
      <div class="cal-grid" id="cal-grid"></div>
    </div>
  </div>

  <!-- 내역 -->
  <div id="list" class="section">
    <div class="filter-bar">
      <input type="text" id="search" placeholder="종목 검색" oninput="renderList()" />
      <select id="filter-type" onchange="renderList()">
        <option value="">전체</option>
        <option value="buy">매수</option>
        <option value="sell">매도</option>
      </select>
      <select id="filter-pnl" onchange="renderList()">
        <option value="">손익 전체</option>
        <option value="profit">수익</option>
        <option value="loss">손실</option>
      </select>
    </div>
    <div class="trade-list" id="trade-list"></div>
  </div>
</div>

<!-- 목표 모달 -->
<div class="goal-modal" id="goal-modal">
  <div class="goal-modal-box">
    <div class="goal-modal-title">🎯 목표 수익률 설정</div>
    <input id="goal-input" type="number" placeholder="목표 수익률 (%) 예: 20" step="0.1" />
    <input id="goal-capital-input" type="number" placeholder="기준 투자금 (원) 예: 10000000" />
    <div class="goal-modal-btns">
      <button class="btn-cancel" onclick="closeGoalModal()">취소</button>
      <button class="btn-primary" onclick="saveGoal()">저장</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
let trades = JSON.parse(localStorage.getItem('stockJournal') || '[]');
let goal = JSON.parse(localStorage.getItem('stockGoal') || 'null');
let calYear, calMonth;
let pnlChart = null, stratChart = null;
let expandedId = null;

function editTitle() {
  const el = document.getElementById('logo-title');
  const cur = el.textContent;
  el.innerHTML = `<input class="logo-input main" value="${cur}" onblur="saveTitle(this)" onkeydown="if(event.key==='Enter')this.blur()" />`;
  el.querySelector('input').select();
}
function saveTitle(inp) {
  const val = inp.value.trim() || '잼비의 매매일지';
  const el = document.getElementById('logo-title');
  el.textContent = val;
  document.title = val;
  localStorage.setItem('journalTitle', val);
}
function editSub() {
  const el = document.getElementById('logo-sub');
  const cur = el.textContent;
  el.innerHTML = `<input class="logo-input sub" value="${cur}" onblur="saveSub(this)" onkeydown="if(event.key==='Enter')this.blur()" />`;
  el.querySelector('input').select();
}
function saveSub(inp) {
  const val = inp.value.trim() || '나만의 주식 트래커';
  document.getElementById('logo-sub').textContent = val;
  localStorage.setItem('journalSub', val);
}

const today = new Date();
calYear = today.getFullYear();
calMonth = today.getMonth();

function init() {
  document.getElementById('f-date').value = today.toISOString().slice(0,10);
  const t = localStorage.getItem('journalTitle');
  const s = localStorage.getItem('journalSub');
  if (t) { document.getElementById('logo-title').textContent = t; document.title = t; }
  if (s) { document.getElementById('logo-sub').textContent = s; }
  updateGoalBar();
}

// ── Goal ──
function openGoalModal() {
  if (goal) {
    document.getElementById('goal-input').value = goal.rate;
    document.getElementById('goal-capital-input').value = goal.capital;
  }
  document.getElementById('goal-modal').classList.add('open');
}
function closeGoalModal() { document.getElementById('goal-modal').classList.remove('open'); }
function saveGoal() {
  const rate = parseFloat(document.getElementById('goal-input').value);
  const capital = parseFloat(document.getElementById('goal-capital-input').value);
  if (!rate || !capital) { showToast('수익률과 투자금을 모두 입력해주세요'); return; }
  goal = { rate, capital };
  localStorage.setItem('stockGoal', JSON.stringify(goal));
  closeGoalModal();
  updateGoalBar();
  showToast('목표가 설정됐어요!');
}
function updateGoalBar() {
  const closed = trades.filter(t => t.pnl !== null);
  const totalPnl = closed.reduce((s,t) => s + t.pnl, 0);
  if (!goal) {
    document.getElementById('goal-current').textContent = `현재 손익 ${Math.round(totalPnl).toLocaleString()}원`;
    document.getElementById('goal-target').textContent = '목표 미설정';
    document.getElementById('goal-fill').style.width = '0%';
    return;
  }
  const currentRate = (totalPnl / goal.capital) * 100;
  const pct = Math.min(Math.max((currentRate / goal.rate) * 100, 0), 100);
  document.getElementById('goal-fill').style.width = pct + '%';
  const sign = currentRate >= 0 ? '+' : '';
  document.getElementById('goal-current').textContent = `현재 ${sign}${currentRate.toFixed(2)}% (${sign}${Math.round(totalPnl).toLocaleString()}원)`;
  document.getElementById('goal-target').textContent = `목표 +${goal.rate}% · ${pct.toFixed(0)}% 달성`;
}

// ── Tabs ──
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach((t,i) => {
    t.classList.toggle('active', ['entry','stats','stocks','calendar','list'][i] === tab);
  });
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.getElementById(tab).classList.add('active');
  if (tab === 'stats') renderStats();
  if (tab === 'stocks') renderStocks();
  if (tab === 'calendar') renderCalendar();
  if (tab === 'list') renderList();
}

// ── Calc ──
function calcPnl() {
  const qty = parseFloat(document.getElementById('f-qty').value) || 0;
  const buy = parseFloat(document.getElementById('f-buy').value) || 0;
  const sell = parseFloat(document.getElementById('f-sell').value) || 0;
  const box = document.getElementById('calc-box');
  if (!qty || !buy) { box.style.display = 'none'; return; }
  box.style.display = 'flex';
  document.getElementById('calc-total').textContent = (qty*buy).toLocaleString() + '원';
  if (sell) {
    const pnl = (sell-buy)*qty, rate = (sell-buy)/buy*100;
    const cls = pnl>0?'pos':pnl<0?'neg':'';
    const sign = pnl>0?'+':'';
    document.getElementById('calc-pnl').className = 'calc-value '+cls;
    document.getElementById('calc-rate').className = 'calc-value '+cls;
    document.getElementById('calc-pnl').textContent = sign+Math.round(pnl).toLocaleString()+'원';
    document.getElementById('calc-rate').textContent = sign+rate.toFixed(2)+'%';
  } else {
    document.getElementById('calc-pnl').className = 'calc-value';
    document.getElementById('calc-rate').className = 'calc-value';
    document.getElementById('calc-pnl').textContent = '-';
    document.getElementById('calc-rate').textContent = '-';
  }
}

// ── Save ──
function saveTrade() {
  const ticker = document.getElementById('f-ticker').value.trim();
  const date = document.getElementById('f-date').value;
  const qty = parseFloat(document.getElementById('f-qty').value);
  const buy = parseFloat(document.getElementById('f-buy').value);
  if (!ticker||!date||!qty||!buy) { showToast('종목, 날짜, 수량, 매수 단가는 필수예요!'); return; }
  const sell = parseFloat(document.getElementById('f-sell').value)||null;
  const pnl = sell?(sell-buy)*qty:null;
  const rate = sell?(sell-buy)/buy*100:null;
  trades.unshift({ id:Date.now(), ticker, date, type:document.getElementById('f-type').value, qty, buy, sell, pnl, rate, strategy:document.getElementById('f-strategy').value, emotion:document.getElementById('f-emotion').value, memo:document.getElementById('f-memo').value.trim() });
  localStorage.setItem('stockJournal', JSON.stringify(trades));
  updateGoalBar();
  showToast('저장했어요!');
  ['f-ticker','f-qty','f-buy','f-sell','f-memo'].forEach(id => document.getElementById(id).value='');
  document.getElementById('f-strategy').value='';
  document.getElementById('f-emotion').value='';
  document.getElementById('calc-box').style.display='none';
}

// ── Stats ──
function renderStats() {
  const closed = trades.filter(t=>t.pnl!==null);
  const wins = closed.filter(t=>t.pnl>0);
  const totalPnl = closed.reduce((s,t)=>s+t.pnl,0);
  const avgRate = closed.length?closed.reduce((s,t)=>s+t.rate,0)/closed.length:0;
  const wr = closed.length?wins.length/closed.length*100:0;
  document.getElementById('stat-count').textContent = trades.length+'회';
  document.getElementById('stat-wr').textContent = wr.toFixed(0)+'%';
  document.getElementById('stat-total-pnl').className = 'scard-value '+(totalPnl>0?'pos':totalPnl<0?'neg':'');
  document.getElementById('stat-total-pnl').textContent = (totalPnl>=0?'+':'')+Math.round(totalPnl).toLocaleString()+'원';
  document.getElementById('stat-avg-rate').className = 'scard-value '+(avgRate>0?'pos':avgRate<0?'neg':'');
  document.getElementById('stat-avg-rate').textContent = (avgRate>=0?'+':'')+avgRate.toFixed(2)+'%';
  document.getElementById('wr-fill').style.width = wr+'%';
  document.getElementById('wr-text').textContent = wins.length+'승 '+(closed.length-wins.length)+'패';

  const sorted = [...closed].sort((a,b)=>a.date.localeCompare(b.date));
  let cum=0;
  const cumData = sorted.map(t=>{cum+=t.pnl;return{x:t.date.slice(5),y:Math.round(cum)};});
  if(pnlChart) pnlChart.destroy();
  const tc = '#B89080';
  pnlChart = new Chart(document.getElementById('pnlChart'),{
    type:'line',
    data:{labels:cumData.map(d=>d.x),datasets:[{label:'누적 손익',data:cumData.map(d=>d.y),borderColor:'#F07B39',backgroundColor:'rgba(240,123,57,0.10)',tension:0.35,pointRadius:3,fill:true}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{color:tc,font:{size:11}},grid:{display:false}},y:{ticks:{color:tc,font:{size:11},callback:v=>(v>=0?'+':'')+v.toLocaleString()+'원'},grid:{color:'rgba(240,123,57,0.08)'}}}}
  });

  const stratMap={};
  trades.forEach(t=>{const k=t.strategy||'미선택';stratMap[k]=(stratMap[k]||0)+1;});
  const sl=Object.keys(stratMap);
  if(stratChart) stratChart.destroy();
  stratChart = new Chart(document.getElementById('stratChart'),{
    type:'doughnut',
    data:{labels:sl,datasets:[{data:sl.map(k=>stratMap[k]),backgroundColor:['#F07B39','#F5A673','#C25A1A','#FDDCC8','#D85A30','#B89080'].slice(0,sl.length),borderWidth:0}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'right',labels:{color:tc,font:{size:11},boxWidth:10,padding:10}}}}
  });
}

// ── Stocks ──
function renderStocks() {
  const closed = trades.filter(t=>t.pnl!==null);
  const map={};
  closed.forEach(t=>{
    if(!map[t.ticker]) map[t.ticker]={ticker:t.ticker,count:0,pnl:0,rates:[],wins:0};
    map[t.ticker].count++;
    map[t.ticker].pnl+=t.pnl;
    map[t.ticker].rates.push(t.rate);
    if(t.pnl>0) map[t.ticker].wins++;
  });
  const rows = Object.values(map).sort((a,b)=>b.pnl-a.pnl);
  const tbody = document.getElementById('stock-tbody');
  const empty = document.getElementById('stock-empty');
  if(!rows.length){tbody.innerHTML='';empty.style.display='block';return;}
  empty.style.display='none';
  const maxAbs = Math.max(...rows.map(r=>Math.abs(r.pnl)));
  tbody.innerHTML = rows.map(r=>{
    const avgRate = r.rates.reduce((s,v)=>s+v,0)/r.rates.length;
    const wr = r.wins/r.count*100;
    const barW = maxAbs?Math.round(Math.abs(r.pnl)/maxAbs*100):0;
    const pnlCls = r.pnl>0?'pos':r.pnl<0?'neg':'';
    const sign = r.pnl>=0?'+':'';
    return `<tr>
      <td style="font-weight:600;">${r.ticker}</td>
      <td>${r.count}회</td>
      <td class="${pnlCls}" style="font-weight:600;">${sign}${Math.round(r.pnl).toLocaleString()}원</td>
      <td class="${pnlCls}">${avgRate>=0?'+':''}${avgRate.toFixed(2)}%</td>
      <td>${wr.toFixed(0)}%</td>
      <td><div class="stock-bar-wrap"><div class="stock-bar" style="width:${barW}%;background:${r.pnl>=0?'var(--pos)':'var(--neg)'};"></div></div></td>
    </tr>`;
  }).join('');
}

// ── Calendar ──
function changeMonth(d){calMonth+=d;if(calMonth>11){calMonth=0;calYear++;}if(calMonth<0){calMonth=11;calYear--;}renderCalendar();}
function renderCalendar(){
  document.getElementById('cal-title').textContent = `${calYear}년 ${calMonth+1}월`;
  const tradeMap={};
  trades.forEach(t=>{
    if(!tradeMap[t.date]) tradeMap[t.date]={count:0,pnl:0};
    tradeMap[t.date].count++;
    if(t.pnl) tradeMap[t.date].pnl+=t.pnl;
  });
  const days=['일','월','화','수','목','금','토'];
  const first=new Date(calYear,calMonth,1).getDay();
  const last=new Date(calYear,calMonth+1,0).getDate();
  const prevLast=new Date(calYear,calMonth,0).getDate();
  let html=days.map(d=>`<div class="cal-day-label">${d}</div>`).join('');
  const todayStr=today.toISOString().slice(0,10);
  for(let i=0;i<first;i++){
    const d=prevLast-first+1+i;
    html+=`<div class="cal-cell other-month"><div class="cal-date">${d}</div></div>`;
  }
  for(let d=1;d<=last;d++){
    const dateStr=`${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const td=tradeMap[dateStr];
    const isToday=dateStr===todayStr;
    const hasTrade=!!td;
    const pnlStr=td&&td.pnl?(td.pnl>=0?'<span class="cal-pnl pos">+':'<span class="cal-pnl neg">')+Math.round(Math.abs(td.pnl)/1000)+'K</span>':'';
    html+=`<div class="cal-cell${hasTrade?' has-trade':''}${isToday?' today':''}">
      <div class="cal-date">${d}</div>
      ${td?`<div class="cal-dot">${td.count}건</div>`:''} 
      ${pnlStr}
    </div>`;
  }
  const remain=(7-((first+last)%7))%7;
  for(let i=1;i<=remain;i++) html+=`<div class="cal-cell other-month"><div class="cal-date">${i}</div></div>`;
  document.getElementById('cal-grid').innerHTML=html;
}

// ── List ──
function renderList(){
  const q=document.getElementById('search').value.toLowerCase();
  const typeF=document.getElementById('filter-type').value;
  const pnlF=document.getElementById('filter-pnl').value;
  const filtered=trades.filter(t=>{
    if(q&&!t.ticker.toLowerCase().includes(q))return false;
    if(typeF&&t.type!==typeF)return false;
    if(pnlF==='profit'&&(t.pnl===null||t.pnl<=0))return false;
    if(pnlF==='loss'&&(t.pnl===null||t.pnl>=0))return false;
    return true;
  });
  const container=document.getElementById('trade-list');
  if(!filtered.length){container.innerHTML='<div class="empty"><i class="ti ti-inbox" style="font-size:32px;display:block;margin-bottom:8px;" aria-hidden="true"></i>아직 매매 기록이 없어요</div>';return;}
  container.innerHTML=filtered.map(t=>{
    const pnlStr=t.pnl!==null?((t.pnl>=0?'+':'')+Math.round(t.pnl).toLocaleString()+'원'):'미체결';
    const pnlCls=t.pnl===null?'':t.pnl>0?'pos':'neg';
    const isExp=expandedId===t.id;
    return `<div class="trade-card${isExp?' expanded':''}" onclick="toggleExpand(${t.id})">
      <div class="tc-header">
        <div class="tc-left">
          <span class="badge badge-${t.type}">${t.type==='buy'?'매수':'매도'}</span>
          <div><span class="tc-ticker">${t.ticker}</span>${t.strategy?`<span class="tc-name"> · ${t.strategy}</span>`:''}</div>
        </div>
        <div class="tc-right">
          <span class="tc-pnl ${pnlCls}">${pnlStr}</span>
          <span class="tc-date">${t.date}</span>
          <i class="ti ti-chevron-${isExp?'up':'down'}" aria-hidden="true" style="color:var(--text3);font-size:14px;"></i>
        </div>
      </div>
      <div class="tc-detail ${isExp?'open':''}">
        <div class="detail-grid">
          <div class="detail-item"><span class="detail-label">수량</span><span class="detail-value">${t.qty.toLocaleString()}주</span></div>
          <div class="detail-item"><span class="detail-label">매수 단가</span><span class="detail-value">${t.buy.toLocaleString()}원</span></div>
          <div class="detail-item"><span class="detail-label">매도 단가</span><span class="detail-value">${t.sell?t.sell.toLocaleString()+'원':'-'}</span></div>
          <div class="detail-item"><span class="detail-label">투자금</span><span class="detail-value">${Math.round(t.qty*t.buy).toLocaleString()}원</span></div>
          <div class="detail-item"><span class="detail-label">수익률</span><span class="detail-value ${pnlCls}">${t.rate!==null?(t.rate>=0?'+':'')+t.rate.toFixed(2)+'%':'-'}</span></div>
          <div class="detail-item"><span class="detail-label">감정</span><span class="detail-value">${t.emotion||'-'}</span></div>
        </div>
        ${t.memo?`<div class="memo-box">${t.memo}</div>`:''}
        <div class="tc-actions">
          <button class="btn-sm btn-del" onclick="deleteTrade(${t.id},event)"><i class="ti ti-trash" aria-hidden="true" style="font-size:13px;margin-right:3px;"></i>삭제</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

function toggleExpand(id){expandedId=expandedId===id?null:id;renderList();}
function deleteTrade(id,e){
  e.stopPropagation();
  if(!confirm('이 기록을 삭제할까요?'))return;
  trades=trades.filter(t=>t.id!==id);
  localStorage.setItem('stockJournal',JSON.stringify(trades));
  if(expandedId===id)expandedId=null;
  renderList();updateGoalBar();showToast('삭제했어요');
}

// ── CSV ──
function exportCSV(){
  if(!trades.length){showToast('내보낼 데이터가 없어요');return;}
  const header=['날짜','종목','구분','수량','매수단가','매도단가','손익(원)','수익률(%)','전략','감정','메모'];
  const rows=trades.map(t=>[t.date,t.ticker,t.type==='buy'?'매수':'매도',t.qty,t.buy,t.sell||'',t.pnl!==null?Math.round(t.pnl):'',t.rate!==null?t.rate.toFixed(2):'',t.strategy||'',t.emotion||'',`"${(t.memo||'').replace(/"/g,'""')}"`]);
  const csv='\uFEFF'+[header,...rows].map(r=>r.join(',')).join('\n');
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8;'}));
  a.download=`매매일지_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
  showToast('CSV 저장됐어요!');
}

function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000);}

init();
</script>
